<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Initiative Tracker</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <h2>Initiative Tracker</h2>

    <div class="controls">

        <button id="loadPlayers">Load Players</button>
        <button id="addActor">Add Actor</button>
        <button id="sortInit">Sort Initiative</button>
        <button id="nextTurn">Next Turn</button>
        <button id="endEncounter">Encounter beenden</button>

        <div class="turnInfo">
            Turn: <span id="currentTurn">-</span> |
            Round: <span id="round">1</span>
        </div>

    </div>
    <div id="monsterModal" class="modal hidden">

        <div class="modalContent">

            <h3>Monster hinzufügen</h3>

            <div class="monsterForm">

                <label>Monster</label>
                <select id="monsterSelect"></select>

                <label>Initiative</label>
                <input id="monsterInit" type="number" value="0">

                <label>HP</label>
                <input id="monsterHP" type="number" value="1">

            </div>

            <div class="modalButtons">
                <button id="addMonsterConfirm">Hinzufügen</button>
                <button id="closeMonsterModal">Abbrechen</button>
            </div>

        </div>
    </div>
    <table id="tracker">

        <thead>
            <tr>
                <th>Name</th>
                <th>Init</th>
                <th>HP</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

    <script type="module" src="../js/initiative.js"></script>

</body>

</html>
